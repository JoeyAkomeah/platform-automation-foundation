---
- name: Install nginx
  ansible.builtin.dnf:
    name: nginx
    state: present

- name: Start nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: yes

- name: Deploy status page
  ansible.builtin.copy:
    dest: /usr/share/nginx/html/index.html
    content: |
      <h1>Platform Foundation Active</h1>
      <p>Instance: {{ ansible_facts['fqdn'] }}</p>
      <p>Kernel: {{ ansible_facts['kernel'] }}</p>
  notify: Restart nginx
